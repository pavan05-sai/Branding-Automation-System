<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BrandCraft</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Removed Google Client Script -->
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            position: relative;
            overflow: hidden;
        }

        /* Ambient background effects */
        .login-container::before, .login-container::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: orbsFloat 10s ease-in-out infinite alternate;
        }

        .login-container::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
            top: -100px;
            left: -200px;
            animation-delay: 0s;
        }

        .login-container::after {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ec4899 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }
        
        @keyframes orbsFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .login-logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
            min-height: 44px;
            /* Prevent layout shift */
        }

        .divider {
            margin: 2rem 0;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .divider span {
            padding: 0 1rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        /* Error message styling */
        #authError {
            color: #ef4444;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
            padding: 0.5rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 6px;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="login-container">
        <div class="login-card">
            <a href="/" style="text-decoration: none;">
                <div class="login-logo">BrandCraft</div>
            </a>
            <p class="login-subtitle">Sign in to access your branding suite</p>

            <!-- Standard Email/Password Form Container -->
            <form id="authForm" class="auth-form" style="margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 1rem; text-align: left;">
                    <label for="email" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com" style="width: 100%; padding: 0.75rem 1rem; box-sizing: border-box; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: var(--text-primary); outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem; text-align: left;">
                    <label for="password" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" style="width: 100%; padding: 0.75rem 1rem; box-sizing: border-box; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: var(--text-primary); outline: none;">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="button" id="signInBtn" class="btn btn-primary" style="flex: 1; padding: 0.8rem; border-radius: 8px; font-weight: 600; font-size: 1rem; border: none; background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%); color: white; cursor: pointer; transition: opacity 0.3s;">Sign In</button>
                    <button type="button" id="signUpBtn" class="btn btn-outline" style="flex: 1; padding: 0.8rem; border-radius: 8px; font-weight: 600; font-size: 1rem; border: 1px solid #ec4899; background: transparent; color: white; cursor: pointer; transition: background 0.3s;">Sign Up</button>
                </div>
            </form>

            <div id="authError"></div>

            <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;">
                By signing in, you agree to our Terms of Service and Privacy Policy. Default demo access is available.
            </p>

            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <!-- Auth Script -->
    <script src="js/auth.js"></script>
    <script>
        // Form initialization handled in auth.js
    </script>
</body>

</html>
